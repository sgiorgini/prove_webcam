<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Casa</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    h1 { margin: 16px; font-size: 24px; }
    #setup {
      margin: 0 16px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    #urlInput {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #f5f5f5;
      font-size: 14px;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #0e6eb8;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #0b5a96; }
    #wrap {
      margin: 0 16px 16px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #333;
      background: #000;
      display: none;
    }
    #cam {
      display: block;
      width: 100%;
      min-height: 220px;
      object-fit: cover;
    }
    #status {
      margin: 0 16px 20px;
      font-size: 14px;
      color: #ffb3b3;
    }
    #hint {
      margin: 0 16px 16px;
      font-size: 13px;
      color: #888;
    }
    #warning {
      margin: 0 16px 12px;
      padding: 10px 14px;
      background: #2a1a00;
      border: 1px solid #a06000;
      border-radius: 8px;
      font-size: 13px;
      color: #ffd080;
      display: none;
    }
    #warning a {
      color: #ffd080;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Camera Casa</h1>

<div id="setup">
  <input id="urlInput" type="text" value="http://100.67.190.24:8123/api/camera_proxy/camera.192_168_1_5?token=7dcce6fc26d21b9fded500deecd59733f1b6453a13da3a162b60b3a597af8a32" />
  <button onclick="avvia()">Avvia</button>
</div>
<p id="hint">L'URL viene salvato solo nel tuo browser, non viene inviato a nessun server.</p>
<div id="warning"></div>

<div id="wrap">
  <img id="cam" alt="Feed camera" />
</div>
<div id="status"></div>

<script>
const STORAGE_KEY = 'camera_url';
const cam = document.getElementById('cam');
const statusEl = document.getElementById('status');
const wrap = document.getElementById('wrap');
const urlInput = document.getElementById('urlInput');
let refreshTimer = null;

// Carica URL salvato
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  urlInput.value = saved;
  avvia();
}

function avvia() {
  const url = urlInput.value.trim();
  if (!url) return;
  localStorage.setItem(STORAGE_KEY, url);

  // Avvisa se URL è HTTP su pagina HTTPS (mixed content bloccato dal browser)
  const warningEl = document.getElementById('warning');
  if (url.startsWith('http://') && location.protocol === 'https:') {
    try {
      const u = new URL(url);
      const base = u.protocol + '//' + u.host;
      warningEl.style.display = 'block';
      warningEl.innerHTML =
        '⚠️ Il tuo URL usa HTTP ma questa pagina è HTTPS: il browser bloccherà il feed.<br>' +
        'Soluzione: <a href="' + base + '" target="_blank">apri prima Home Assistant in una nuova scheda</a>, ' +
        'accetta il certificato, poi torna qui e premi di nuovo <strong>Avvia</strong>.';
    } catch(e) {}
  } else {
    warningEl.style.display = 'none';
  }
  wrap.style.display = 'block';
  statusEl.textContent = '';
  clearInterval(refreshTimer);
  caricaFrame(url);
  refreshTimer = setInterval(() => caricaFrame(url), 3000);
}

function caricaFrame(base) {
  cam.src = base + (base.includes('?') ? '&' : '?') + 't=' + Date.now();
}

cam.addEventListener('error', function () {
  statusEl.textContent = 'Feed non raggiungibile. Verifica URL, rete e che il server camera sia accessibile da questo dispositivo.';
});

cam.addEventListener('load', function () {
  statusEl.textContent = '';
});
</script>
</body>
</html>
